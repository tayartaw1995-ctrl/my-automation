name: Evening Video Upload and Live Stream

on:
  push:
  workflow_dispatch:

jobs:
# (အောက်က ကုဒ်တွေအားလုံးကို ဘာမှထပ်ပြင်စရာမလိုပါ၊ အတိုင်းထားလိုက်ပါ)
  run-automation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Setup Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install Pillow google-auth-oauthlib google-api-python-client gdown

    - name: Download Evening Files
      run: |
        gdown ${{ secrets.E_VIDEO_LINK }} -O e_video.mp4
        gdown ${{ secrets.E_THUMB_VIDEO }} -O e_video_thumb_raw.jpg

    - name: Upload and Schedule Video
      env:
        YOUTUBE_CLIENT_SECRETS_DATA: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        YOUTUBE_TOKEN_DATA: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      run: python automation.py evening
