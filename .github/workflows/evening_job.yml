name: Evening Video Upload and Live Stream # ညနေပိုင်းဆိုရင် Evening ပေါ့

on:
  workflow_dispatch: # လက်ဖြင့် သို့မဟုတ် API (Termux) မှ လှမ်းခေါ်မှသာ အလုပ်လုပ်ရန်
jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
    - name: Repo ထဲမှ ကုဒ်များအား စက်ထဲသို့ ထည့်ခြင်း
      uses: actions/checkout@v3

    - name: Python နှင့် FFmpeg အား စက်ထဲတွင် အသင့်ပြင်ဆင်ခြင်း
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install Pillow google-auth-oauthlib google-api-python-client gdown

    - name: Google Drive မှ ညနေပိုင်းဖိုင်များ ဒေါင်းလုဒ်ဆွဲခြင်း
      run: |
        gdown ${{ secrets.E_VIDEO_LINK }} -O e_video.mp4
        gdown ${{ secrets.E_THUMB_VIDEO }} -O e_video_thumb_raw.jpg
        # ⚠️ လောလောဆယ် Secret ထဲတွင် မထည့်ရသေးသဖြင့် အောက်ပါ Live ဖိုင်များကို ခေတ္တပိတ်ထားသည်
        # gdown ${{ secrets.E_AUDIO_LINK }} -O e_audio.mp3
        # gdown ${{ secrets.E_THUMB_LIVE }} -O e_live_thumb_raw.jpg

    - name: Python ဖြင့် ညနေပိုင်း ဗီဒီယိုအား Schedule တင်ခြင်း
      env:
        YOUTUBE_CLIENT_SECRETS_DATA: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        YOUTUBE_TOKEN_DATA: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      run: python automation.py evening

    # =========================================================================
    # ⚠️ Live Stream Key မရသေးမီ ကုဒ် Error မတက်စေရန် အောက်ပါလုပ်ငန်းစဉ်များကို ပိတ်ထားပါသည်
    # =========================================================================
    # - name: ညနေပိုင်း Live Thumbnail ဗီဒီယိုပေါ်သို့ ရက်စွဲထည့်ခြင်း
    #   run: |
    #     ffmpeg -i e_live_thumb_raw.jpg -vf "drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='$(date +%d.%m.%Y)':x=(w-tw)/2+200:y=h-th-50:fontcolor=white:fontsize=90:box=1:boxcolor=black@0.6" -y e_live_video_ready.mp4

    # - name: YouTube ပေါ်သို့ ညနေပိုင်း Live စတင်လွှင့်ခြင်း
    #   run: |
    #     ffmpeg -stream_loop -1 -i e_live_video_ready.mp4 -i e_audio.mp3 -c:v libx264 -pix_fmt yuv420p -preset veryfast -b:v 2500k -c:a aac -b:a 128k -f flv -t 21000 "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
